name: Extreme Profile Automation

on:
  schedule:
    - cron: "0 0 * * *" # Runs every midnight
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Generate 3D Git Calendar
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          user: AhmerKhanNiazi
          template: classic
          base: ""
          config_timezone: Asia/Karachi
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year
          output_action: commit
          committer_branch: output
          committer_message: "chore: update 3D metrics"
          filename: github-metrics.svg
          
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'
          
      - name: Update Threat Feed
        run: python update_threat_feed.py
        
      - name: Commit Threat Feed
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Auto-update Threat Intel Feed"
          file_pattern: 'README.md'
